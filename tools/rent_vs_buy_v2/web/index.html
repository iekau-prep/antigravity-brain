<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>賃貸 vs 持ち家 シミュレーション | マイホーム診断</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-wrapper">
        <header class="app-header">
            <h1>🏠 賃貸 vs 持ち家：正直シミュレーション</h1>
            <p class="app-subtitle">「家賃を払い続ける」のと「マイホームを買う」の、どちらが本当にお得か計算します。</p>
        </header>

        <main class="container">
            <!-- 入力セクション -->
            <section class="input-section">
                <h2>基本条件を入力</h2>

                <div class="input-grid">
                    <div class="input-group">
                        <label for="current-rent">現在の家賃（管理費込）</label>
                        <div class="input-wrapper">
                            <input type="number" id="current-rent" value="100000" step="1000">
                            <span class="unit">円/月</span>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="buy-price">購入希望価格</label>
                        <div class="input-wrapper">
                            <input type="number" id="buy-price" value="5000">
                            <span class="unit">万円</span>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="down-payment">頭金</label>
                        <div class="input-wrapper">
                            <input type="number" id="down-payment" value="500">
                            <span class="unit">万円</span>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="interest-rate">住宅ローン金利</label>
                        <div class="input-wrapper">
                            <input type="number" id="interest-rate" value="0.5" step="0.1">
                            <span class="unit">%</span>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="loan-term">ローン年数</label>
                        <div class="input-wrapper">
                            <input type="number" id="loan-term" value="35">
                            <span class="unit">年</span>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="years-owned">居住予定年数</label>
                        <div class="input-wrapper">
                            <input type="number" id="years-owned" value="35">
                            <span class="unit">年</span>
                        </div>
                    </div>
                </div>

                <button id="calc-button" class="btn-primary">診断する</button>
            </section>

            <!-- 結果サマリー -->
            <section id="result-section" class="result-section" style="display: none;">
                <div id="result-card" class="result-card">
                    <div class="result-diff-label">差額</div>
                    <div id="result-diff-value" class="result-diff-value">¥---</div>
                    <div id="result-conclusion" class="result-conclusion">結論：---</div>
                    <div id="result-reason" class="result-reason">理由：---</div>
                    <div id="result-breakeven" class="result-breakeven">損益分岐点：---</div>
                </div>

                <!-- 住宅判断タイプ (将来接続用プレースホルダー) -->
                <div id="type-diagnosis-placeholder" class="placeholder-box">
                    <p class="placeholder-title">【将来連携】住宅判断タイプ（type_diagnosis）</p>
                    <p class="placeholder-desc">タイプ診断結果がここに表示されます</p>
                </div>

                <!-- CTA -->
                <div class="cta-section">
                    <button id="cta-recalc" class="btn-secondary">条件を変えて再診断</button>
                    <!-- loan_safety 将来接続用 -->
                    <button id="cta-loan-safety" class="btn-primary btn-large">
                        借りられる目安チェック（loan_safety等へ）<span class="arrow">›</span>
                    </button>
                </div>

                <!-- LINE連携 (将来接続用プレースホルダー) -->
                <div id="line-integration-placeholder" class="placeholder-box">
                    <p class="placeholder-title">【将来連携】LINEで結果を保存</p>
                    <p class="placeholder-desc">LINE連携導線がここに表示されます</p>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>

</html>
